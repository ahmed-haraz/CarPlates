name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install MAUI Workloads
      run: dotnet workload install maui-android

    - name: Restore dependencies
      run: dotnet restore CarPlates.sln

    - name: Build
      run: dotnet build CarPlates.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test CarPlates.sln --no-build --verbosity normal

    - name: Publish Android
      run: |
        cd src/CarPlates.Mobile
        dotnet publish -f net9.0-android -c Release -p:AndroidPackageFormat=apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: src/CarPlates.Mobile/bin/Release/net9.0-android/*.apk
