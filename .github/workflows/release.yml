name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install MAUI Workloads
      run: dotnet workload install maui-android

    - name: Restore & Build
      run: |
        dotnet restore
        dotnet build -c Release

    - name: Publish Signed APK
      run: |
        cd src/CarPlates.Mobile
        dotnet publish -f net9.0-android -c Release           -p:AndroidPackageFormat=aab           -p:AndroidKeyStore=true           -p:AndroidSigningKeyStore=${{ secrets.KEYSTORE_PATH }}           -p:AndroidSigningStorePass=${{ secrets.KEYSTORE_PASSWORD }}           -p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }}           -p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }}

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: src/CarPlates.Mobile/bin/Release/net9.0-android/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
